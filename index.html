<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Zara ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c0211 0%, #000000 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' style='font-size:24px'><text y='20'>✨</text></svg>"), auto;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 120px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 20px;
            margin: 0;
            /* Neon Glow Effect */
            text-shadow: 0 0 10px #ff4d94, 0 0 20px #ff4d94, 0 0 40px #ff4d94, 0 0 80px #ff4d94;
            animation: pulse 2s ease-in-out infinite;
            user-select: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .message-box {
            margin-top: 40px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            letter-spacing: 1px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover .message-box {
            opacity: 1;
            transform: translateY(0);
        }

        /* Heart & Star Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: moveUp 4s linear forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1 id="name">ZARA</h1>
        <div class="message-box">
            <span id="text-change">তুমি পাশে থাকলেই সব ম্যাজিক মনে হয়! ✨</span>
        </div>
    </div>

    <script>
        // হার্ট আর স্পার্কল তৈরি করার ফাংশন
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const items = ['❤️', '✨', '🌸', '💖'];
            particle.innerHTML = items[Math.floor(Math.random() * items.length)];
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '100vh';
            particle.style.fontSize = Math.random() * 20 + 10 + 'px';
            particle.style.filter = `blur(${Math.random() * 1}px)`;
            
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 4000);
        }

        setInterval(createParticle, 150);

        // মেসেজ অটো চেঞ্জ হওয়ার ছোট ট্রিক
        const messages = [
            "তুমি তো একদম ছোট একটা পিচ্চি!",
              "তুমি একটা কিউটের ডিব্বা..",
            "সবসময় এভাবেই থেকো, জারা। 😊",
            "তুমি হাসলে আমার সব কষ্ট দূর হয়ে যায়!"
        ];
        
        let i = 0;
        const textElement = document.getElementById('text-change');
        
        setInterval(() => {
            textElement.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % messages.length;
                textElement.innerHTML = messages[i];
                textElement.style.opacity = 1;
            }, 500);
        }, 4000);
    </script>

</body>
</html>
